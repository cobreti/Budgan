<mat-toolbar class="header">
  <button mat-icon-button class="menu-icon" (click)="onMenuBtnClick()">
    <mat-icon>menu</mat-icon>
  </button>
  <button type="button" class="brand" (click)="onHome()" data-testid="header-brand">
    <img class="brand-icon" ngSrc="/icons/Budgan48.png" width="48" height="48" alt="" priority />
    <span class="title">{{ 'app.title' | translate }}</span>
  </button>

  <span class="spacer"></span>

  <app-header-page-title></app-header-page-title>

  <span class="spacer"></span>

  <button
    mat-icon-button
    class="theme-toggle"
    (click)="toggleTheme()"
    [attr.aria-label]="(isDark() ? 'header.switchToLight' : 'header.switchToDark') | translate"
    data-testid="theme-toggle-btn">
    <mat-icon>{{ isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>

  <button mat-icon-button [matMenuTriggerFor]="localeMenu" class="locale-trigger">
    <mat-icon>language</mat-icon>
  </button>

  <mat-menu #localeMenu="matMenu">
    <button mat-menu-item (click)="switchLocale('en')">English</button>
    <button mat-menu-item (click)="switchLocale('fr')">Français</button>
  </mat-menu>
</mat-toolbar>
