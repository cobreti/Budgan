<h2 mat-dialog-title class="confirm-dialog__title">{{ data.title | translate }}</h2>
<mat-dialog-content class="confirm-dialog__message">
  {{ data.message | translate }}
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button
    mat-button
    type="button"
    data-testid="confirm-dialog-cancel"
    (click)="onCancel()">
    {{ data.cancelLabel | translate }}
  </button>
  <button
    mat-button
    type="button"
    data-testid="confirm-dialog-confirm"
    [class.confirm-dialog__confirm--danger]="data.danger"
    (click)="onConfirm()">
    {{ data.confirmLabel | translate }}
  </button>
</mat-dialog-actions>
