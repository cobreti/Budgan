<mat-card class="account-snapshot">
  <mat-card-title class="title">{{ 'accountSnapshot.title' | translate }}</mat-card-title>
  <div class="v-spacer"></div>
  <mat-card-content>
    @if (!hasSnapshot()) {
      <p class="account-snapshot__empty">{{ 'accountSnapshot.empty' | translate }}</p>
    }
    <form [formGroup]="form" (ngSubmit)="onSave()" class="account-snapshot__form">
      <mat-form-field>
        <mat-label>{{ 'accountSnapshot.date' | translate }}</mat-label>
        <input
          matInput
          [matDatepicker]="picker"
          formControlName="date"
          data-testid="account-snapshot-date"
        />
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>
      <mat-form-field>
        <mat-label>{{ 'accountSnapshot.amount' | translate }}</mat-label>
        <input
          matInput
          type="number"
          step="0.01"
          formControlName="amount"
          data-testid="account-snapshot-amount"
        />
      </mat-form-field>
      <div class="account-snapshot__actions">
        @if (hasSnapshot()) {
          <button
            class="save-btn"
            mat-stroked-button
            type="button"
            color="warn"
            (click)="onDelete()"
            data-testid="account-snapshot-delete"
          >
            {{ 'accountSnapshot.delete' | translate }}
          </button>
        }
        <button
          class="save-btn"
          mat-flat-button
          type="submit"
          [disabled]="form.invalid"
          data-testid="account-snapshot-save"
        >
          {{ 'accountSnapshot.save' | translate }}
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
