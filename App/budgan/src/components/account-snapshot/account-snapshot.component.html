<mat-card class="account-snapshot">
  <mat-card-title class="title">{{ 'accountSnapshot.title' | translate }}</mat-card-title>
  <div class="v-spacer"></div>
  <mat-card-content>
    @if (!hasSnapshot()) {
      <p class="account-snapshot__empty">{{ 'accountSnapshot.empty' | translate }}</p>
    }
    <form [formGroup]="form" (ngSubmit)="onSave()" class="account-snapshot__form">
      <mat-form-field>
        <mat-label>{{ 'accountSnapshot.date' | translate }}</mat-label>
        <input
          matInput
          type="date"
          formControlName="dateAsString"
          data-testid="account-snapshot-date"
        />
      </mat-form-field>
      <mat-form-field>
        <mat-label>{{ 'accountSnapshot.amount' | translate }}</mat-label>
        <input
          matInput
          type="number"
          step="0.01"
          formControlName="amount"
          data-testid="account-snapshot-amount"
        />
      </mat-form-field>
      <button
        class="save-btn"
        mat-flat-button
        type="submit"
        [disabled]="form.invalid"
        data-testid="account-snapshot-save"
      >
        {{ 'accountSnapshot.save' | translate }}
      </button>
    </form>
  </mat-card-content>
</mat-card>
