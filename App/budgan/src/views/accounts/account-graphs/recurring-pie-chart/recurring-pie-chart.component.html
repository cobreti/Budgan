<div class="recurring-pie-chart">
  @if (selectedMonth()) {
    @if (slices().length > 0) {
      <div class="recurring-pie-chart__chart-container">
        <canvas
          baseChart
          class="recurring-pie-chart__canvas"
          [type]="'pie'"
          [data]="chartData()"
          [options]="chartOptions"
          [attr.aria-label]="'recurringPieChart.ariaLabel' | translate"
          role="img"
        ></canvas>
      </div>
    } @else {
      <p class="recurring-pie-chart__empty">{{ 'recurringPieChart.noDataForMonth' | translate }}</p>
    }
  } @else {
    <p class="recurring-pie-chart__empty">{{ 'recurringPieChart.noData' | translate }}</p>
  }
</div>
